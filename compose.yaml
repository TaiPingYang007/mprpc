name: mprpc

x-mprpc-build: &mprpc-build
  context: .
  dockerfile: Dockerfile
  args:
    MUDUO_REF: ${MUDUO_REF:-b55b0ac}

x-mprpc-env: &mprpc-env
  MPRPC_ZK_NAMESPACE: ${MPRPC_ZK_NAMESPACE:-mprpc}
  ZK_ENDPOINTS: ${ZK_ENDPOINTS:-zookeeper:2181}
  ZK_CONNECT_TIMEOUT_MS: ${ZK_CONNECT_TIMEOUT_MS:-5000}
  ZK_SESSION_TIMEOUT_MS: ${ZK_SESSION_TIMEOUT_MS:-30000}
  RPC_CONNECT_TIMEOUT_MS: ${RPC_CONNECT_TIMEOUT_MS:-3000}
  RPC_SEND_TIMEOUT_MS: ${RPC_SEND_TIMEOUT_MS:-3000}
  RPC_RECV_TIMEOUT_MS: ${RPC_RECV_TIMEOUT_MS:-5000}
  MPRPC_LOG_MODE: ${MPRPC_LOG_MODE:-stdout}
  MPRPC_LOG_DIR: ${MPRPC_LOG_DIR:-/var/log/mprpc}
  RPC_BIND_IP: ${RPC_BIND_IP:-0.0.0.0}
  RPC_ADVERTISE_HOST: ${RPC_ADVERTISE_HOST:-127.0.0.1}
  RPC_PORT: ${RPC_PORT:-8000}
  RPC_IO_THREADS: ${RPC_IO_THREADS:-4}

x-mprpc-common: &mprpc-common
  build: *mprpc-build
  image: mprpc:docker-first
  init: true
  environment: *mprpc-env
  depends_on:
    zookeeper:
      condition: service_started

services:
  zookeeper:
    image: zookeeper:3.9.3
    container_name: mprpc-zookeeper
    restart: unless-stopped

  userservice-1:
    <<: *mprpc-common
    container_name: mprpc-userservice-1
    command: ["userservice"]
    environment:
      <<: *mprpc-env
      RPC_BIND_IP: 0.0.0.0
      RPC_ADVERTISE_HOST: userservice-1
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8000"]
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 5s

  userservice-2:
    <<: *mprpc-common
    container_name: mprpc-userservice-2
    command: ["userservice"]
    environment:
      <<: *mprpc-env
      RPC_BIND_IP: 0.0.0.0
      RPC_ADVERTISE_HOST: userservice-2
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8000"]
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 5s

  friendservice-1:
    <<: *mprpc-common
    container_name: mprpc-friendservice-1
    command: ["friendservice"]
    environment:
      <<: *mprpc-env
      RPC_BIND_IP: 0.0.0.0
      RPC_ADVERTISE_HOST: friendservice-1
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8000"]
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 5s

  client:
    <<: *mprpc-common
    container_name: mprpc-client
    command: ["calluserservice"]
    environment:
      <<: *mprpc-env
    depends_on:
      zookeeper:
        condition: service_started
      userservice-1:
        condition: service_healthy
      userservice-2:
        condition: service_healthy
      friendservice-1:
        condition: service_healthy

  smoke-test:
    <<: *mprpc-common
    container_name: mprpc-smoke-test
    command: ["smoke-test"]
    environment:
      <<: *mprpc-env
    depends_on:
      zookeeper:
        condition: service_started
      userservice-1:
        condition: service_healthy
      userservice-2:
        condition: service_healthy
      friendservice-1:
        condition: service_healthy
